<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك معالجة الفيديو الذكي</title>
    <script src="https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@latest/dist/coi-serviceworker.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>معالج الفيديو الاحترافي</h1>
        
        <div class="card">
            <h3>التحقق من الهوية</h3>
            <div class="input-group">
                <input type="text" id="clientId" placeholder="أدخل Client ID الخاص بك">
                <input type="password" id="pinCode" placeholder="أدخل رمز الـ PIN">
            </div>
            <button id="authBtn">تحقق وتحديث القائمة</button>
        </div>

        <div id="mainSection" class="hidden">
            <div class="card">
                <h3>الفيديوهات المتاحة</h3>
                <div id="videoContainer" class="video-grid">
                    <p class="status-msg">يرجى الضغط على التحقق لجلب الفيديوهات...</p>
                </div>
            </div>

            <div class="card">
                <h3>إعدادات المعالجة</h3>
                <div class="input-group">
                    <label for="audioFile">اختر ملف الصوت (MP3):</label>
                    <input type="file" id="audioFile" accept="audio/mp3">
                </div>
                <div class="input-group">
                    <label for="videoSelect">الفيديو المختار:</label>
                    <input type="text" id="videoSelect" readonly placeholder="لم يتم اختيار فيديو بعد">
                </div>
                <button id="submitBtn" class="primary-btn">بدء معالجة الفيديو النهائي</button>
            </div>

            <div id="progressSection" class="hidden card">
                <p id="statusText">جاهز للمعالجة...</p>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
